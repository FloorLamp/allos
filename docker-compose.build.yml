# Local-build override. The default docker-compose.yml pulls a pre-built image
# from the registry; layer this on top to build from source instead:
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
services:
  allos:
    build: .
  # Build the same image locally for the scheduler sidecar too.
  allos-notify:
    build: .
