name: Publish image

# Build the image on a GitHub-hosted runner and push it to GHCR. Deploying it is
# the box's job, not this workflow's: pull the freshly published tag and restart
# (docker compose pull && up -d), by hand or from a host cron/systemd timer — see
# README "Deploy with Docker". (An earlier revision drove the restart from a
# self-hosted runner job here; that job has been removed.)
#
# Triggered on merges to main, plus a manual "Run workflow".
#
# Security: only `push` (main) and `workflow_dispatch` — never `pull_request`,
# so fork PRs can't push images.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Don't let two publishes race each other on the :latest tag.
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  # ghcr.io/<owner>/<package>. Hardcoded lowercase (GHCR requires it) and the
  # package is the brand name "allos", not the repo name — so it's spelled out
  # here rather than derived from `github.repository`. The package is created
  # under the owner on first push and linked to this repo for token access.
  IMAGE: ghcr.io/floorlamp/allos

jobs:
  build:
    # Only the canonical repo builds/pushes to FloorLamp's GHCR package. A fork
    # has no access to that package, so skip the pipeline there rather than
    # failing every push.
    if: github.repository == 'FloorLamp/allos'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v7

      - name: Capture commit message
        run: echo "COMMIT_MESSAGE=$(git log -1 --pretty=%s)" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build once and push two tags: an immutable :<sha> a deploy can pin to,
      # and :latest for `docker compose pull`. The in-image `next build` (which
      # runs tsc) is the CI gate — a type error fails the build and nothing is
      # pushed.
      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Baked into the image so the UI can show which commit is running.
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            COMMIT_MESSAGE=${{ env.COMMIT_MESSAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Every publish pushes a fresh :<sha> version to GHCR, so old ones pile up
      # forever. Keep only the most recent handful and delete the rest. The
      # newest version always carries :latest (it's re-tagged onto each build),
      # so min-versions-to-keep protects it — no risk of nuking the live tag.
      - name: Prune old GHCR image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: allos
          package-type: container
          min-versions-to-keep: 3
          # Our old versions are :<sha>-tagged, not untagged, so we must opt in
          # to deleting tagged versions (this input defaults to true = untagged
          # only). min-versions-to-keep still shields the newest N (incl :latest).
          delete-only-untagged-versions: "false"
