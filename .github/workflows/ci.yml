name: CI

# PR-time checks the deploy pipeline doesn't provide. deploy.yml only runs on
# push to main (gated by `next build`), so without this nothing validates a PR.
# Safe to run on pull_request: it touches no secrets and does no deploy.
#
# pull_request ONLY (no push trigger): with both, every push to a PR branch ran
# the whole suite twice — identical jobs on the push event and the PR merge ref.
# Branches without a PR aren't validated until their PR opens, which is when
# validation matters. The concurrency group cancels superseded runs, so pushing a
# fixup two minutes after a commit doesn't finish CI for the dead head.
on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      # Whole-node_modules cache: the single biggest step in both jobs is
      # `npm ci` (~2 min, dominated by better-sqlite3's native compile). The key
      # pins the exact lockfile AND .nvmrc (native modules are built per node
      # ABI), so a hit is byte-identical to what npm ci would produce and the
      # install is skipped entirely. No restore-keys on purpose: a stale
      # node_modules under a changed lockfile must never be reused.
      - name: Cache node_modules
        id: modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci
        if: steps.modules.outputs.cache-hit != 'true'

      # Two-part audit now that the moderate surface is cleared (#668):
      # 1. Full non-blocking audit for visibility — surfaces any moderate (or
      #    lower) advisory in the CI log without wedging merges/deploys. The
      #    known moderates (next's nested postcss, exceljs' uuid) are resolved
      #    via `overrides` in package.json, so this should read clean today; a
      #    NEW moderate would show here as advisory-only.
      # 2. Blocking gate at high severity — a high/critical advisory FAILS the
      #    check job instead of scrolling past unnoticed. Moderates stay
      #    advisory (step 1); highs are enforced.
      - name: Audit dependencies (visibility)
        run: npm audit
        continue-on-error: true

      - name: Audit dependencies (blocking, high+)
        run: npm audit --audit-level=high

      # PHI guard: scan the whole tree for likely-real NPIs/phones/SSNs
      # using the pure detector in lib/phi-scan.ts. High-signal structural checks
      # only (Luhn-valid NPIs, dialable non-555 phones, valid-shaped SSNs), so
      # synthetic fixtures pass. Fails the PR instead of relying on a reviewer.
      - name: PHI scan
        run: npm run phi-scan

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Pure unit suite AND the coverage regression floor in one pass. This runs
      # the same test set as `npm test` (vitest.config.ts include: lib/**), just
      # under v8 coverage, so it doubles as the correctness gate — a separate
      # `npm test` step would only re-run the identical suite. Fails the job if
      # lib/** coverage drops below the thresholds in vitest.config.ts (a tripwire
      # a few points under the current baseline). app/** and components/** are
      # intentionally not gated.
      - name: Test + coverage
        run: npm run test:coverage

      # DB integration + action tier, under its OWN coverage floor. This tier
      # exercises the query/action write paths that need a live schema — the
      # modules the pure gate above never imports (so they report ~0% there).
      # Running it under v8 coverage (thresholds in vitest.db.config.ts, a
      # tripwire a few points under the measured baseline) makes those modules'
      # real coverage visible and catches a regression the pure gate can't see;
      # it also still exercises migrate() on both a fresh and an existing
      # ("upgrade") database, catching boot-crash-on-upgrade regressions. The
      # instrumentation adds only ~15s over the plain run.
      - name: Test (DB) + coverage
        run: npm run test:db:coverage

  # Changed-spec scrutiny lane (#868, fix c; #889), as its OWN job so its
  # zero-retry verdict lands fast and short-circuits before the sharded full
  # suite below finishes. This lane's `--repeat-each=3 --retries=0` fails a spec
  # that isn't reliably green (three-in-a-row at zero retries catches a ≤50%-flaky
  # spec), so retry-masking can't land a flaky/changed spec. The sharded full
  # suite now runs at zero retries too (playwright.config.ts, #1159), so a flake
  # fails loudly everywhere rather than being retried into green.
  #   • base ref: under pull_request the checkout is the MERGE commit, so HEAD^1
  #     is the PR base parent (fetch-depth:2 guarantees it's present). We prefer
  #     the event's base.sha when it happens to be in history, else fall back to
  #     HEAD^1 — robust for both PR and push (HEAD^1 is the prior commit).
  #   • auth.setup.ts is passed alongside so the login dependency runs even
  #     though the file filter wouldn't otherwise match it.
  #
  # SHARED INFRA (#889): a PR that edits ONLY a shared e2e module — helpers.ts,
  # seed-events.ts, fixture-logins.ts, nav.ts, symptom-helpers.ts, auth.setup.ts
  # — changed no `*.spec.ts`, so the spec filter matched nothing and this lane
  # used to skip entirely. That's backwards: shared infra is the HIGHEST blast
  # radius (seed-events.ts + fixture-logins.ts build the seed EVERY spec runs
  # against; nav.ts re-exports helpers.ts). A grep import-map would be
  # structurally dishonest for exactly those files — it maps seed-events.ts to
  # zero importing specs and would run nothing. So when any shared (non-spec)
  # e2e/*.ts changed we fall back to the WHOLE suite at --retries=0 (no
  # repeat-each): one bounded extra pass, total coverage for the infra blast
  # radius. repeat-each is deliberately NOT applied suite-wide (that ~27 min run
  # is the cost the fallback avoids). A mixed diff (spec + infra) does BOTH — the
  # changed specs at --repeat-each=3 AND the full suite at --retries=0 — so
  # neither set is dropped.
  e2e-changed:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth 2: the pull_request checkout is the MERGE commit, so depth 2
      # brings both parents — enough for the diffs below (HEAD^1 is the PR base).
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      # Cheap gate BEFORE the expensive setup/build: this job has work only when
      # the PR touched something under e2e/. (Docs-only PRs trivially pass too.)
      - name: Detect changed e2e files
        id: e2e-diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            BASE="HEAD^1"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          if git diff --name-only "$BASE" HEAD | grep -qE '^e2e/.*\.ts$'; then
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "No changed e2e files - skipping the retries=0 lane."
          fi

      - uses: ./.github/actions/e2e-setup
        if: steps.e2e-diff.outputs.any == 'true'

      - name: E2E changed specs + shared-infra scrutiny (retries=0)
        if: steps.e2e-diff.outputs.any == 'true'
        run: |
          DIFF=$(git diff --name-only "${{ steps.e2e-diff.outputs.base }}" HEAD)
          CHANGED_SPECS=$(echo "$DIFF" | grep -E '^e2e/.*\.spec\.ts$' || true)
          CHANGED_INFRA=$(echo "$DIFF" | grep -E '^e2e/.*\.ts$' | grep -vE '\.spec\.ts$' || true)

          if [ -n "$CHANGED_SPECS" ]; then
            echo "Changed e2e specs (running at --repeat-each=3 --retries=0):"
            echo "$CHANGED_SPECS"
            npx playwright test e2e/auth.setup.ts $CHANGED_SPECS --repeat-each=3 --retries=0
          fi

          if [ -n "$CHANGED_INFRA" ]; then
            echo "Changed shared e2e infra (whole suite at --retries=0 - highest blast radius):"
            echo "$CHANGED_INFRA"
            npx playwright test --retries=0
          fi

      - name: Upload Playwright report
        if: ${{ !cancelled() && steps.e2e-diff.outputs.any == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-changed
          path: playwright-report/
          retention-days: 7

  # Browser end-to-end tier: boots the real Next app against an isolated seeded
  # SQLite DB and drives it in Chromium (Playwright). Separate job so it runs in
  # parallel with `check` and its slower browser/build steps don't gate the fast
  # lint/type/unit feedback. No secrets; no ANTHROPIC_API_KEY, so AI features
  # degrade gracefully (the flows under test don't need them).
  #
  # SHARDED 4-way (flaky-e2e hardening): each shard is a fresh runner + fresh
  # `npx playwright test --shard=N/4` invocation → fresh app/demo servers per
  # chunk. This cuts the per-push e2e wall-clock roughly in half AND removes the
  # long-lived-server cumulative degradation the orchestration runbook documents
  # for single-process full runs (docs/orchestration.md). fail-fast is off so a
  # red shard still lets the others finish — one push yields the full failure
  # picture instead of a partial one.
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      # fetch-depth 2: the pull_request checkout is the MERGE commit, so depth 2
      # brings both parents — enough for the docs-only diff below (HEAD^1 is the
      # PR base).
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      # Docs-only PRs skip the browser suite (#61): the whole PR diff (merge
      # commit vs its base parent) touching nothing outside README/SECURITY/
      # LICENSE/AGENTS.md (+ its CLAUDE.md symlink)/docs means there is no
      # runtime surface to drive. Steps below gate on this output; the job
      # itself still completes green, so nothing blocks even if checks are
      # later made required. The `check` job (phi-scan, format, lint) always
      # runs — those apply to docs too.
      - name: Detect non-docs changes
        id: changes
        run: |
          if git diff --name-only HEAD^1 HEAD | grep -qvE '^(README\.md|SECURITY\.md|LICENSE|AGENTS\.md|CLAUDE\.md|docs/)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only diff - skipping the browser suite."
          fi

      - uses: ./.github/actions/e2e-setup
        if: steps.changes.outputs.code == 'true'

      - name: E2E (Playwright, shard ${{ matrix.shard }}/4)
        if: steps.changes.outputs.code == 'true'
        run: npm run test:e2e -- --shard=${{ matrix.shard }}/4

      # Flake telemetry (retained). The sharded matrix now runs at zero retries
      # (playwright.config.ts, #1159), so there is no "flaky" status here and this
      # reports an accurate empty — the flake backlog it once measured is cleared,
      # which is what let full-suite retries drop. Kept because it's the same step
      # e2e-full.yml relies on: an on-demand census at --retries=1 still surfaces
      # pass-on-retry tests through this script. Telemetry only — always exits 0.
      - name: Flake report
        if: ${{ !cancelled() && steps.changes.outputs.code == 'true' }}
        run: node scripts/e2e-flake-report.mjs test-results/e2e-results.json | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: ${{ !cancelled() && steps.changes.outputs.code == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7
