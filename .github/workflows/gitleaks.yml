name: gitleaks

# Secret scanning for the repo's full git history. Runs on every PR and on
# pushes to non-main branches (deploy.yml handles main). Fails the job if any
# secret is detected. Self-contained: it downloads the gitleaks binary and runs
# it directly, so it needs no marketplace action and no license key.
on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      # Full history so the scan covers every commit, not just the tip.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "$url" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan full history
        run: gitleaks git --log-opts="--all" --redact -v .
